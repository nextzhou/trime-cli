name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install librime (macOS)
        if: runner.os == 'macOS'
        run: brew list librime >/dev/null 2>&1 || brew install librime

      - name: Install librime and fonts (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y librime-dev fonts-noto-cjk

      - name: Run tests
        run: ./gradlew test

      - name: Build fat jar
        run: ./gradlew shadowJar

      - name: Smoke validate default theme
        run: java -jar build/libs/trime-cli-all.jar validate vendor/rime/shared/trime.yaml

      - name: Smoke render
        run: |
          mkdir -p build/smoke
          java -jar build/libs/trime-cli-all.jar render vendor/rime/shared/tongwenfeng.trime.yaml -o build/smoke

      - name: Smoke report
        run: java -jar build/libs/trime-cli-all.jar report vendor/rime/shared/tongwenfeng.trime.yaml -o build/smoke/report.html
