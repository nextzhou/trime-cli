name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Build fat jar
        run: ./gradlew shadowJar

      - name: Smoke validate
        run: java -jar build/libs/trime-cli-all.jar validate --no-rime src/test/resources/tongwenfeng.trime.yaml

      - name: Smoke render
        run: |
          mkdir -p build/smoke
          java -jar build/libs/trime-cli-all.jar render --no-rime src/test/resources/tongwenfeng.trime.yaml -o build/smoke

      - name: Smoke report
        run: java -jar build/libs/trime-cli-all.jar report --no-rime src/test/resources/tongwenfeng.trime.yaml -o build/smoke/report.html
