name: Feature request
description: 提出一个新功能或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 请先说明当前缺少什么能力，而不是直接贴一个实现方案。
      placeholder: 例如：当前 report 只能输出 HTML，我希望额外导出 JSON 摘要以便集成到 CI。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案
      description: 描述你期望的命令、输出或交互。
      placeholder: 例如：新增 `report --json summary.json`，输出校验摘要和键盘列表。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 说明你为什么没有采用当前已有能力或其他绕过方式。
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可以贴样例配置、目标输出格式、上下游集成场景等。
